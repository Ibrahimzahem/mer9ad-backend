# Shield Backend — single container with bundled frontend
#   docker compose up --build
# Then open http://localhost:8080
#
# Set your Groq API key in a .env file or environment:
#   GROQ_API_KEY=gsk_your_key_here
services:
  backend:
    build: .
    image: shield-backend
    ports:
      - "8080:8080"
    environment:
      SHIELD_AI: ${SHIELD_AI:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_TEMPERATURE: ${OPENROUTER_TEMPERATURE:-0.2}
      OPENROUTER_REASONING_MODEL: ${OPENROUTER_REASONING_MODEL:-google/gemini-2.5-flash}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    restart: unless-stopped
