spring.application.name=Ra9ed-HAmad

# OpenRouter (OpenAI-compatible) AI layer. All overridable via environment.
# When OPENROUTER_API_KEY is empty, Shield auto-selects the deterministic StubShieldAi.
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:google/gemini-2.5-flash}
openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
openrouter.temperature=${OPENROUTER_TEMPERATURE:0.2}

logging.level.com.hackathon.ra9edhamad=INFO
